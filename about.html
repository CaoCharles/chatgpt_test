<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>About Me</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="blog.html">Blog</a>
    </nav>
  </header>
  <main>
    <section id="bio">
      <h2>Biography</h2>
      <p id="bio-text">
        Hello! I'm Jane Doe, a software developer passionate about web technology.
        I love creating clean and efficient code, sharing knowledge, and writing
        articles about programming.
      </p>
    </section>
    <section id="assistant">
      <h2>Ask My Bio Assistant</h2>
      <div>
        <textarea id="question" rows="4" cols="50" placeholder="Ask me anything about my biography..."></textarea>
      </div>
      <div>
        <button onclick="askBio()">Ask</button>
      </div>
      <div id="answer"></div>
    </section>
  </main>
  <footer>
    <p>&copy; 2023 Jane Doe</p>
  </footer>
  <script src="assistant.js"></script>
